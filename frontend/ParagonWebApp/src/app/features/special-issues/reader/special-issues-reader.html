<section class="min-h-screen bg-gradient-to-b from-[#0b1c2d] via-[#0d2438] to-[#0b1c2d] text-white pb-0">

<!-- HEADER -->
<header class="px-6 py-3 flex items-center justify-between border-b border-white/10 bg-[#0b1c2d]/95 backdrop-blur-md">
  <div class="flex-1 max-w-3xl">
    <h1 class="text-lg md:text-xl font-bold tracking-tight bg-gradient-to-r from-white via-white to-white/70 bg-clip-text text-transparent drop-shadow-sm">
      {{ issue?.title }}
    </h1>
    <div class="flex items-center gap-2 mt-1.5">
      <div class="flex items-center gap-1.5 px-2 py-0.5 rounded-md bg-white/5 border border-white/10">
        <svg class="w-3 h-3 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <p class="text-[10px] text-white/70 font-medium tracking-wide">
          {{ issue?.academicYear }}
        </p>
      </div>

      <span class="text-[10px] uppercase tracking-wider font-bold text-[#F4B400] bg-gradient-to-r from-[#F4B400]/15 to-[#F4B400]/5 px-2.5 py-1 rounded-full border border-[#F4B400]/30 shadow-sm">
        {{ issue?.type }}
      </span>
    </div>
  </div>

    <a
    routerLink="/special-issues"
    class="ml-6 px-4 py-2 rounded-lg text-xs font-semibold text-[#F4B400] bg-gradient-to-r from-[#F4B400]/8 to-[#F4B400]/5 border border-[#F4B400]/40 hover:border-[#F4B400] hover:from-[#F4B400]/20 hover:to-[#F4B400]/10 hover:shadow-lg hover:shadow-[#F4B400]/25 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 whitespace-nowrap flex items-center gap-2 group relative overflow-hidden">

    <!-- Shine Effect -->
    <span class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-out"></span>

    <!-- Content -->
    <span class="relative flex items-center gap-2">
      <svg class="w-3.5 h-3.5 group-hover:-translate-x-0.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      <span>Back to Library</span>
    </span>
  </a>
</header>

  <!-- READER AREA -->
  <div class="flex justify-center px-4 md:px-6 pt-8 md:pt-12 pb-0">

    <!-- Flipbook Container -->
    <div class="w-full max-w-4xl transition-all duration-300 pb-8">

      <!-- Loading/Info Bar -->
      <div class="mb-8 text-center">
        <div class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-gradient-to-r from-white/5 via-white/10 to-white/5 border border-white/20 backdrop-blur-md shadow-lg hover:shadow-xl hover:border-white/30 transition-all duration-300">
          <!-- Animated Indicator -->
          <div class="relative flex items-center justify-center">
            <div class="w-2 h-2 bg-[#F4B400] rounded-full animate-pulse"></div>
            <div class="absolute w-2 h-2 bg-[#F4B400] rounded-full animate-ping opacity-75"></div>
          </div>

          <!-- Text Content -->
          <p class="text-white/80 text-sm font-medium tracking-wide">
            <span class="text-white/60">Reading</span>
            <span class="mx-1.5 text-white/40">•</span>
            <span class="text-[#F4B400]">{{ issue?.academicYear }}</span>
            <span class="mx-1.5 text-white/40">•</span>
            <span class="text-white">{{ issue?.title }}</span>
          </p>
        </div>
      </div>

      <div
        #readerContainer
        class="relative w-full h-[600px] bg-gradient-to-br from-white via-gray-50 to-white rounded-2xl shadow-2xl flex items-center justify-center text-[#0b1c2d] border border-white/20 overflow-hidden group p-6
        fullscreen:h-screen
        fullscreen:max-h-screen
        touch-pan-y">

        <!-- FULLSCREEN BUTTON -->
        <button
          (click)="toggleFullscreen()"
          class="
            absolute top-4 right-4 z-30
            w-10 h-10
            flex items-center justify-center
            rounded-lg
            bg-white/90 backdrop-blur-sm
            border border-white/60
            shadow-lg
            text-[#0b1c2d]
            hover:bg-[#F4B400]
            hover:text-white
            hover:border-[#F4B400]
            hover:shadow-xl
            hover:shadow-[#F4B400]/30
            hover:scale-105
            active:scale-95
            transition-all duration-300
          "
          title="Toggle Fullscreen"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 4h6M4 4v6M20 4h-6M20 4v6M4 20h6M4 20v-6M20 20h-6M20 20v-6"/>
          </svg>
        </button>

        <!-- Subtle Background Pattern -->
        <div class="absolute inset-0 opacity-5 pointer-events-none">
          <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <defs>
              <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
                <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#0b1c2d" stroke-width="0.5"/>
              </pattern>
            </defs>
            <rect width="100" height="100" fill="url(#grid)" />
          </svg>
        </div>

        <div
          class="relative z-10 w-full h-full flex items-center justify-center"
        >
          <div
            *ngIf="!flipbookAvailable"
            class="absolute inset-0 z-20 flex items-center justify-center rounded-2xl bg-white/90 p-6 text-center text-sm font-semibold text-[#0b1c2d]"
          >
            Flipbook library not found. Install dependencies (e.g. run <code>npm install</code>) and reload.
          </div>
          <div
            #flipbookContainer
            class="h-[95%] w-full"
            style="max-width: 100%; max-height: 100%;"
          ></div>
        </div>

        <!-- Corner Accents -->
        <div class="absolute top-0 left-0 w-24 h-24 bg-gradient-to-br from-[#F4B400]/10 to-transparent rounded-tl-2xl pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-24 h-24 bg-gradient-to-tl from-[#F4B400]/10 to-transparent rounded-br-2xl pointer-events-none"></div>
      </div>

      <!-- CONTROLS -->
      <div
        class="
          mt-8
          mx-auto w-fit
          flex items-center gap-2
          px-4 py-2
          rounded-full
          bg-[#0b1c2d]/90 backdrop-blur-md
          border border-white/10
          shadow-[0_12px_40px_-20px_rgba(0,0,0,0.6)]
          hover:border-white/20
          transition-all duration-300
        "
      >

        <!-- Prev -->
        <button
          (click)="prevPage()"
          [disabled]="!flipbookAvailable || !canGoPrev"
          class="
            group flex items-center gap-1.5
            text-xs font-semibold
            text-white/70
            hover:text-[#F4B400]
            hover:scale-105
            active:scale-95
            transition-all duration-200
            disabled:opacity-30
            disabled:cursor-not-allowed
            disabled:hover:scale-100
            px-2 py-1
          "
        >
          <span class="text-sm group-hover:-translate-x-0.5 transition-transform duration-300">←</span>
          <span class="hidden sm:inline">Prev</span>
        </button>

        <!-- Divider -->
        <span class="h-3 w-px bg-white/10"></span>

        <!-- Page Indicator -->
        <span
          class="
            px-3 py-1
            text-[10px] tracking-wider font-bold
            text-[#F4B400]
            bg-gradient-to-r from-[#F4B400]/10 to-[#F4B400]/5
            rounded-full
            border border-[#F4B400]/30
            shadow-inner
            select-none
            min-w-[65px]
            text-center
          "
        >
          {{ pageLabel }}
        </span>

        <input
        type="number"
        min="1"
        [max]="totalPages"
        [value]="currentPage"
        (change)="jumpToPage($any($event.target).value)"
        [disabled]="!flipbookAvailable"
        class="w-14 text-center text-xs bg-transparent border border-white/20 rounded-b-md text-white focus:outline-none"
        />

        <!-- Divider -->
        <span class="h-3 w-px bg-white/10"></span>

        <!-- Next -->
        <button
          (click)="nextPage()"
          [disabled]="!flipbookAvailable || currentPage >= totalPages"
          class="
            group flex items-center gap-1.5
            text-xs font-semibold
            text-white/70
            hover:text-[#F4B400]
            hover:scale-105
            active:scale-95
            transition-all duration-200
            disabled:opacity-30
            disabled:cursor-not-allowed
            disabled:hover:scale-100
            px-2 py-1
          "
        >
          <span class="hidden sm:inline">Next</span>
          <span class="text-sm group-hover:translate-x-0.5 transition-transform duration-300">→</span>
        </button>

      </div>

      <!-- Controls Info -->
      <div class="mt-6 text-center">
        <div class="inline-flex items-center gap-3 px-4 py-2">
          <div class="flex items-center gap-1.5 text-white/40 text-[10px] uppercase tracking-wide font-medium">
            <span class="text-xs opacity-60">🖱️</span>
            <span>Click to navigate</span>
          </div>
          <span class="h-2.5 w-px bg-white/20"></span>
          <div class="flex items-center gap-1.5 text-white/40 text-[10px] uppercase tracking-wide font-medium">
            <span class="text-xs opacity-60">⌨️</span>
            <span>Arrow keys</span>
          </div>
        </div>
      </div>

    </div>

  </div>

</section>
