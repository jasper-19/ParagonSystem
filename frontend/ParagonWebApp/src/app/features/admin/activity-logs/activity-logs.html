<div class="space-y-8">
  <!-- Page Title -->
      <div class="space-y-2">
        <h2 class="text-3xl sm:text-4xl font-bold text-gray-900 tracking-tight">
            Activity Logs
          </h2>
        <p class="text-base text-gray-600">
          Review all user activities and system events in one place.
      </div>

      <!-- ...existing header/content... -->



      <!-- Filters -->
      <app-activity-log-filters (filtersChange)="onFiltersChange($event)"></app-activity-log-filters>

      <div *ngIf="isLoading" class="text-sm text-gray-500">Loading activity logs...</div>
      <div *ngIf="!isLoading && errorMessage" class="text-sm text-red-600">{{ errorMessage }}</div>

      <!-- Table -->
      <app-activity-log-table
        [logs]="isLoading ? [] : paginatedLogs"
        (view)="viewDetails($event)">
      </app-activity-log-table>

      <!-- Modal -->
      <app-activity-log-details-modal
        *ngIf="selectedLog"
        [log]="selectedLog"
        (close)="closeModal()">
      </app-activity-log-details-modal>

      <!-- Pagination -->
      <div class="flex flex-col gap-4 mt-6">

        <!-- Top Row: Page Size + Info -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">

          <!-- Left: Page Size Selector -->
          <div class="flex items-center gap-2 text-xs sm:text-sm text-gray-600">
            <span>Show</span>

            <select
              #pageSizeSelect
              [value]="pageSize"
              (change)="onPageSizeChange(pageSizeSelect.value)"
              class="px-3 py-1.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#f4b400] focus:outline-none"
            >
              <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
            </select>

            <span>entries</span>
          </div>

          <!-- Right: Page Info -->
          <div class="text-xs sm:text-sm text-gray-500">
            Showing
            <span class="font-medium text-gray-800">{{ rangeStart() }}–{{ rangeEnd() }}</span>
            of
            <span class="font-medium text-gray-800">{{ totalResults }}</span>
          </div>

        </div>

        <!-- Bottom Row: Pagination Controls -->
        <div class="flex items-center justify-center gap-1 sm:gap-2">

          <button
            (click)="currentPage = currentPage - 1"
            [disabled]="currentPage === 1"
            class="px-2 py-1 sm:px-3 sm:py-1.5 text-xs sm:text-sm rounded-lg border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Prev
          </button>

          <button
            *ngFor="let page of pageNumbers()"
            (click)="currentPage = page"
            [ngClass]="{
              'bg-[#000035] text-white': currentPage === page,
              'bg-gray-100': currentPage !== page
            }"
            class="px-2 py-1 sm:px-3 sm:py-1.5 text-xs sm:text-sm rounded-lg min-w-8 sm:min-w-10"
          >
            {{ page }}
          </button>

          <button
            (click)="currentPage = currentPage + 1"
            [disabled]="currentPage === totalPages"
            class="px-2 py-1 sm:px-3 sm:py-1.5 text-xs sm:text-sm rounded-lg border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Next
          </button>

        </div>

      </div>
</div>
