<div class="space-y-5">

  <!-- ── HEADER ── -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
    <div>
      <h2 class="text-[11px] font-black uppercase tracking-[0.18em] text-[#000035]">User Management</h2>
      <p class="text-[11px] text-[#000035]/35 mt-0.5">Manage roles, access, and account status.</p>
    </div>
    <button
      (click)="openAddModal()"
      class="flex items-center gap-2 bg-[#000035] hover:bg-[#000035]/85 text-white text-[10px] font-black uppercase tracking-[0.18em] px-4 py-2.5 rounded-lg transition-all duration-200 cursor-pointer shrink-0">
      <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Add User
    </button>
  </div>

  <!-- ── SEARCH ── -->
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 size-4 text-[#000035]/25 pointer-events-none" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
    </svg>
    <input
      type="text"
      (input)="search($event)"
      placeholder="Search users…"
      class="w-full bg-[#000035]/2 border border-[#000035]/8 rounded-lg pl-9 pr-4 py-2.5 text-sm text-[#000035] placeholder:text-[#000035]/25 focus:outline-none focus:ring-2 focus:ring-[#F4B400]/40 focus:border-[#F4B400]/50 transition-all duration-200"
    />
  </div>

  <!-- ── TABLE ── -->
  <div class="border border-[#000035]/8 rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm min-w-150">

        <!-- Head -->
        <thead>
          <tr class="bg-[#000035]/3 border-b border-[#000035]/8">
            <th class="text-left px-5 py-3 text-[9px] font-black uppercase tracking-[0.18em] text-[#000035]/35">Name</th>
            <th class="text-left px-5 py-3 text-[9px] font-black uppercase tracking-[0.18em] text-[#000035]/35">Email</th>
            <th class="text-left px-5 py-3 text-[9px] font-black uppercase tracking-[0.18em] text-[#000035]/35">Role</th>
            <th class="text-left px-5 py-3 text-[9px] font-black uppercase tracking-[0.18em] text-[#000035]/35">Status</th>
            <th class="text-center px-5 py-3 text-[9px] font-black uppercase tracking-[0.18em] text-[#000035]/35">Actions</th>
          </tr>
        </thead>

        <!-- Body -->
        <tbody class="divide-y divide-[#000035]/5">
          <tr
            *ngFor="let user of filteredUsers()"
            class="group hover:bg-[#000035]/1 transition-colors duration-150"
          >

            <!-- Name -->
            <td class="px-5 py-3.5">
              <div class="flex items-center gap-3">
                <div class="size-7 rounded-full bg-[#000035]/8 flex items-center justify-center shrink-0">
                  <span class="text-[10px] font-black text-[#000035]/40 uppercase">
                    {{ user.name.charAt(0) }}
                  </span>
                </div>
                <span class="font-semibold text-[#000035] text-sm">{{ user.name }}</span>
              </div>
            </td>

            <!-- Email -->
            <td class="px-5 py-3.5 text-[#000035]/50 text-xs">{{ user.email }}</td>

            <!-- Role -->
            <td class="px-5 py-3.5">
              <select
                [value]="user.role"
                (change)="changeRole(user, $any($event.target).value)"
                class="bg-white border border-[#000035]/10 rounded-lg px-2.5 py-1.5 text-xs font-semibold text-[#000035] focus:outline-none focus:ring-2 focus:ring-[#F4B400]/40 focus:border-[#F4B400]/50 cursor-pointer transition-all duration-200"
              >
                <option>Admin</option>
                <option>Editor</option>
                <option>Staff</option>
              </select>
            </td>

            <!-- Status -->
            <td class="px-5 py-3.5">
              <span
                [ngClass]="{
                  'bg-emerald-50 text-emerald-700 border-emerald-200': user.status === 'active',
                  'bg-red-50 text-red-600 border-red-200': user.status === 'inactive'
                }"
                class="inline-flex items-center gap-1.5 border text-[9px] font-black uppercase tracking-[0.15em] px-2.5 py-1 rounded-full"
              >
                <span
                  [ngClass]="{
                    'bg-emerald-500': user.status === 'active',
                    'bg-red-400': user.status === 'inactive'
                  }"
                  class="size-1.5 rounded-full shrink-0"
                ></span>
                {{ user.status }}
              </span>
            </td>

            <!-- Actions -->
            <td class="px-5 py-3.5">
              <div class="flex items-center justify-center gap-2">
                <button
                  (click)="toggleStatus(user)"
                  [ngClass]="{
                    'text-red-500 hover:bg-red-50 border-red-200 hover:border-red-300': user.status === 'active',
                    'text-emerald-600 hover:bg-emerald-50 border-emerald-200 hover:border-emerald-300': user.status !== 'active'
                  }"
                  class="border text-[9px] font-black uppercase tracking-[0.15em] px-3 py-1.5 rounded-lg transition-all duration-200 cursor-pointer whitespace-nowrap"
                >
                  {{ user.status === 'active' ? 'Deactivate' : 'Activate' }}
                </button>
                <button
                  (click)="openEditModal(user)"
                  class="flex items-center gap-1.5 bg-[#000035] hover:bg-[#000035]/80 text-white text-[9px] font-black uppercase tracking-[0.15em] px-3 py-1.5 rounded-lg transition-all duration-200 cursor-pointer"
                >
                  <svg class="size-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487z"/>
                  </svg>
                  Edit
                </button>
              </div>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div
      *ngIf="filteredUsers().length === 0"
      class="flex flex-col items-center justify-center py-14 gap-3 border-t border-[#000035]/5"
    >
      <div class="size-10 rounded-full bg-[#000035]/5 flex items-center justify-center">
        <svg class="size-5 text-[#000035]/20" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
      </div>
      <p class="text-[10px] font-black uppercase tracking-[0.18em] text-[#000035]/25">No users found</p>
    </div>

  </div>
</div>


<app-user-modal
  [isOpen]="modalOpen"
  [userData]="selectedUser"
  (close)="modalOpen = false"
  (save)="modalOpen = false"
></app-user-modal>
