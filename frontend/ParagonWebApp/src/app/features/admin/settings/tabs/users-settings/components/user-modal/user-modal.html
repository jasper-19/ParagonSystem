<div *ngIf="isOpen" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-9999 flex items-center justify-center p-4" (click)="onClose()">

  <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden relative" (click)="$event.stopPropagation()">

    <!-- Header with Background -->
    <div class="relative bg-linear-to-br from-[#000035] via-[#001f5c] to-[#000035] px-8 py-6">

      <div class="relative flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <h3 class="text-2xl font-bold text-white mb-2">{{ isEditMode ? 'Edit User' : 'Add User' }}</h3>

          <div class="flex flex-wrap items-center gap-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-xl bg-white/10 text-slate-200 border border-white/10 backdrop-blur-sm">
              <div class="w-1.5 h-1.5 bg-[#F4B400] rounded-full"></div>
              <span class="text-sm font-medium">Mode:</span>
              <span class="text-sm font-semibold text-white">{{ isEditMode ? 'Edit' : 'Create' }}</span>
            </div>
          </div>
        </div>

        <!-- Close Button -->
        <button (click)="onClose()" class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 text-white transition-all duration-300 backdrop-blur-sm border border-white/10 hover:border-white/20" aria-label="Close" type="button">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Content -->
    <div class="p-8 space-y-6 max-h-[calc(100vh-12rem)] overflow-y-auto">

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 text-sm">

        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Full name</label>
          <input type="text" formControlName="name" placeholder="Full name" class="w-full border-2 border-slate-200 rounded-xl p-3 mt-2 focus:outline-none focus:border-[#F4B400]/40" />
          <p *ngIf="form.get('name')?.touched && form.get('name')?.invalid" class="text-red-500 text-xs mt-1">Name is required (min 3 characters)</p>
        </div>

        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Email</label>
          <input type="email" formControlName="email" placeholder="Email" class="w-full border-2 border-slate-200 rounded-xl p-3 mt-2 focus:outline-none focus:border-[#F4B400]/40" />
          <p *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="text-red-500 text-xs mt-1">Enter a valid email</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Role</label>
            <select formControlName="role" class="w-full border-2 border-slate-200 rounded-xl p-3 mt-2 focus:outline-none focus:border-[#F4B400]/40">
              <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
            </select>
          </div>

          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Status</label>
            <select formControlName="status" class="w-full border-2 border-slate-200 rounded-xl p-3 mt-2 focus:outline-none focus:border-[#F4B400]/40">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div *ngIf="!isEditMode">
          <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Password</label>
          <input type="password" formControlName="password" placeholder="Password" class="w-full border-2 border-slate-200 rounded-xl p-3 mt-2 focus:outline-none focus:border-[#F4B400]/40" />
          <p *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="text-red-500 text-xs mt-1">Password must be at least 6 characters</p>
        </div>

        <div class="flex justify-end gap-3 border-t border-slate-200 pt-4">
          <button type="button" (click)="onClose()" class="px-6 py-3 rounded-xl bg-gray-200 hover:bg-gray-300">Cancel</button>
          <button type="submit" [disabled]="isSubmitting" class="px-6 py-3 rounded-xl bg-[#000035] text-white font-bold shadow-lg hover:shadow-xl">{{ isSubmitting ? 'Saving...' : (isEditMode ? 'Save changes' : 'Create user') }}</button>
        </div>

      </form>

    </div>

  </div>

</div>
