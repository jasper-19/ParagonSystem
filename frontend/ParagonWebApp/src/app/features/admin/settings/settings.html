
<div class="space-y-8">
  <!-- Page Title -->
      <div class="space-y-2">
        <h2 class="text-3xl sm:text-4xl font-bold text-gray-900 tracking-tight">
            Site Settings
          </h2>
        <p class="text-base text-gray-600">
          Configure your system preferences and settings
        </p>
      </div>

        <div class="bg-white border border-[#000035]/8 rounded-xl shadow-[0_1px_4px_rgba(0,0,53,0.06)] overflow-hidden">

          <!-- Tabs -->
          <div class="flex items-stretch overflow-x-auto border-b border-[#000035]/8 bg-[#000035]/2 scrollbar-none">
            <button
              *ngFor="let tab of tabs"
              (click)="setTab(tab)"
              [ngClass]="{
                'text-[#000035] border-b-2 border-[#F4B400] bg-[#f4b400] font-[#000035]': activeTab === tab,
                'text-[#000035]/40 border-b-2 border-transparent hover:text-[#000035] hover:bg-white/60': activeTab !== tab
              }"
              class="shrink-0 px-5 py-3.5 text-[11px] font-bold uppercase tracking-[0.18em] transition-all duration-200 cursor-pointer whitespace-nowrap"
            >
              {{ tab }}
            </button>
          </div>

          <!-- Tab Content -->
          <div class="p-5 sm:p-7">
            <ng-container [ngSwitch]="activeTab">
              <app-general-settings *ngSwitchCase="'general'"></app-general-settings>
              <app-users-settings   *ngSwitchCase="'users'"></app-users-settings>
              <app-site-security-settings *ngSwitchCase="'security'"></app-site-security-settings>
              <app-content-settings *ngSwitchCase="'content'"></app-content-settings>
              <app-appearance-settings *ngSwitchCase="'appearance'"></app-appearance-settings>
              <app-notification-settings *ngSwitchCase="'notifications'"></app-notification-settings>
              <app-maintenance-settings *ngSwitchCase="'maintenance'"></app-maintenance-settings>

              <div *ngSwitchDefault class="flex flex-col items-center justify-center py-16 text-center gap-3">
                <div class="w-10 h-10 rounded-full bg-[#000035]/5 flex items-center justify-center">
                  <svg class="w-5 h-5 text-[#000035]/25" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l5.653-4.655m5.833-4.62a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0z"/>
                  </svg>
                </div>
                <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-[#000035]/30">Module under development</p>
              </div>
            </ng-container>
          </div>

        </div>

</div>
