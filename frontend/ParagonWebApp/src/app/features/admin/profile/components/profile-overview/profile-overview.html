<!-- Profile Card -->
<section *ngIf="staff"
  class="relative bg-white rounded-2xl overflow-hidden shadow-[0_1px_3px_rgba(0,0,53,0.08),0_8px_32px_rgba(0,0,53,0.06)] border border-[#000035]/10">

  <div class="px-4 sm:px-8 py-5 sm:py-7 flex flex-col sm:flex-row sm:items-center gap-4 sm:gap-8">

    <!-- Avatar -->
    <div class="relative group shrink-0">
      <div class="p-0.75 rounded-full  shadow-md">
        <img
          *ngIf="avatarPreview; else defaultAvatarTpl"
          [src]="avatarPreview"
          class="w-16 h-16 sm:w-20 sm:h-20 rounded-full object-cover block"
          alt="Profile"
        />
        <ng-template #defaultAvatarTpl>
          <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-[#f5f5f8] flex items-center justify-center text-xl sm:text-2xl font-semibold text-[#000035]">
            {{ staff.fullName.charAt(0) }}
          </div>
        </ng-template>
      </div>
      <!-- Hover Upload Overlay -->
      <label
        class="absolute inset-0 bg-[#000035]/70 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center text-white text-[11px] font-medium tracking-wide cursor-pointer rounded-full transition-opacity duration-200 gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        Upload
        <input type="file" class="hidden" (change)="onAvatarChange($event)" />
      </label>
    </div>

    <!-- Vertical Divider -->
    <div class="hidden sm:block self-stretch w-px bg-[#000035]/8 shrink-0"></div>
    <div class="block sm:hidden w-full h-px bg-[#000035]/8"></div>

    <!-- Info -->
    <div class="flex-1 min-w-0">

      <!-- Name + Badge -->
      <div class="flex items-center gap-3 flex-wrap">
        <h2 class="text-xl sm:text-[22px] font-semibold text-[#000035] tracking-tight leading-tight truncate">
          {{ staff.fullName }}
        </h2>
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-bold tracking-widest bg-[#f4b400]/15 text-[#000035] border border-[#f4b400]/40 uppercase">
          System Administrator
        </span>
      </div>

      <!-- Email -->
      <p class="text-sm text-[#000035]/50 mt-1.5 flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-[#000035]/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
        </svg>
        {{ staff.email }}
      </p>

      <!-- Metadata chips -->
      <div class="flex flex-wrap items-center gap-2.5 mt-4">

        <!-- Assigned Role -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-[#000035]/4 border border-[#000035]/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
          <span class="text-xs text-[#000035]/50 font-medium">Role</span>
          <span class="text-xs font-semibold text-[#000035]">{{ staff.assignedRole || '—' }}</span>
        </div>

        <!-- Assigned Section -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-[#000035]/4 border border-[#000035]/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21" />
          </svg>
          <span class="text-xs text-[#000035]/50 font-medium">Section</span>
          <span class="text-xs font-semibold text-[#000035]">{{ staff.assignedSection || '—' }}</span>
        </div>

        <!-- Joined -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-[#000035]/4 border border-[#000035]/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
          </svg>
          <span class="text-xs text-[#000035]/50 font-medium">Joined</span>
          <span class="text-xs font-semibold text-[#000035]">{{ staff.createdAt | date:'mediumDate' }}</span>
        </div>

      </div>
    </div>

    <!-- Edit Button -->
    <button
      (click)="openEdit.emit()"
      class="shrink-0 w-full sm:w-auto justify-center inline-flex items-center gap-2 px-5 py-2.5 bg-[#000035] text-white text-sm font-medium rounded-xl hover:bg-[#000035]/90 active:scale-95 transition-all duration-150 shadow-sm cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125" />
      </svg>
      Edit Profile
    </button>

  </div>
</section>
