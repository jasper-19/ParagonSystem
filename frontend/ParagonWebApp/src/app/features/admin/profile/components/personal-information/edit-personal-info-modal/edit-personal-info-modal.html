<!-- Overlay -->
<div *ngIf="isOpen"
     class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

  <!-- Modal Box -->
  <div class="bg-white w-full max-w-lg rounded-xl shadow-lg p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold">Edit Personal Information</h3>

      <button (click)="closeModal()"
        class="text-gray-500 hover:text-red-500">
        ✕
      </button>
    </div>

    <!-- Form -->
    <div class="space-y-3 text-sm">

      <input [(ngModel)]="editData.fullName"
        placeholder="Full Name"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.email"
        placeholder="Email"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.studentId"
        placeholder="Student ID"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.yearLevel"
        placeholder="Year Level"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.collegeId"
        placeholder="College ID"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.programId"
        placeholder="Program ID"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.positionId"
        placeholder="Position ID"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.subRole"
        placeholder="Sub Role"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.assignedSection"
        placeholder="Assigned Section"
        class="w-full border rounded-lg px-3 py-2">

      <input [(ngModel)]="editData.assignedRole"
        placeholder="Assigned Role"
        class="w-full border rounded-lg px-3 py-2">

    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2 mt-5">

      <button (click)="closeModal()"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
        Cancel
      </button>

      <button (click)="saveChanges()"
        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
        Save
      </button>

    </div>

  </div>
</div>
