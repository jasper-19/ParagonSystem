<app-sidebar
  (logoutRequested)="onLogoutRequested()">
</app-sidebar>

<!-- Mobile Backdrop (overlay when sidebar is open on mobile) -->
<div
  *ngIf="isMobileView && isSidebarOpen"
  (click)="closeSidebarOnMobile()"
  class="fixed inset-0 bg-black/50 z-50 md:hidden transition-opacity duration-300"
></div>

<main
  class="min-h-screen transition-all duration-300 flex flex-col"
  [ngClass]="{
    'ml-72': isSidebarOpen && !isMobileView,
    'ml-20': !isSidebarOpen && !isMobileView,
    'ml-0': isMobileView,
    'blur-sm pointer-events-none': isMobileView && isSidebarOpen
  }"
>

  <!-- Header -->
  <app-admin-header
    class="shrink-0 relative z-50"
    [isMobileView]="isMobileView"
    [isSidebarOpen]="isSidebarOpen"
    (menuToggle)="toggleSidebarFromHeader()"
  ></app-admin-header>

  <!-- Content Area -->
  <div class="flex-1 bg-gray-50">

    <!-- Breadcrumb Wrapper -->
    <div class="px-6 lg:px-10 pt-16">
      <app-breadcrumb></app-breadcrumb>
    </div>

    <!-- Page Content -->
    <div class="px-6 lg:px-10 py-6 lg:py-8">
      <div class="max-w-screen-2xl mx-auto">
        <div class="admin-page-shell">
          <div class="admin-page-content" [class.admin-page-content--hidden]="isAdminNavigating">
            <router-outlet></router-outlet>
          </div>

          <!-- Only block UI during route navigation; background requests shouldn't hide the page. -->
          <div *ngIf="isAdminNavigating" class="admin-loader-overlay" aria-live="assertive">
            <div class="admin-route-loader">
              <div role="alert" class="loader"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

</main>

<app-confirmation-modal
  [isOpen]="confirm.isOpen()"
  [title]="confirm.title()"
  [message]="confirm.message()"
  [confirmText]="confirm.confirmText()"
  [cancelText]="confirm.cancelText()"
  [variant]="confirm.variant()"
  (confirmed)="confirm.accept()"
  (cancelled)="confirm.cancel()"
></app-confirmation-modal>
