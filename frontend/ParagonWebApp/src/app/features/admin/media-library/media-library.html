<div class="flex min-h-0 flex-1 overflow-hidden bg-(--color-background-tertiary) xl:gap-6">

  <!-- Media Grid Section -->
  <div class="min-h-0 flex-1 overflow-y-auto pb-6 flex flex-col gap-8">

    <!-- Header -->
    <div class="flex flex-col gap-6">

      <!-- Top Row -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div class="space-y-2">
          <h2 class="text-3xl sm:text-4xl font-bold text-gray-900 tracking-tight">
            Media Library
          </h2>
          <p class="text-base text-gray-600">
            Manage images, videos, and documents you've uploaded.
          </p>
        </div>
      </div>

    </div>

    <!-- Search + Upload -->
    <div class="flex w-full items-center justify-between gap-4">
      <div class="w-full max-w-md">
        <input
          type="text"
          [ngModel]="searchTerm"
          (ngModelChange)="onSearchChange($event)"
          placeholder="Search files by name or type..."
          class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#f4b400] focus:outline-none text-sm bg-white"
        />
      </div>

      <div class="shrink-0">
        <app-media-uploader (filesSelected)="onUploadFiles($event)"></app-media-uploader>
      </div>
    </div>

    <!-- Loading State -->
    <div
      *ngIf="isLoading"
      class="flex flex-col items-center justify-center h-64 rounded-xl bg-(--color-background-primary)"
      style="border: 1.5px dashed rgba(0,0,53,0.15);">
      <div
        class="w-9 h-9 rounded-full mb-3"
        style="border: 2.5px solid rgba(0,0,53,0.08); border-top-color: #000035; animation: spin 0.8s linear infinite;">
      </div>
      <p class="text-sm font-medium text-(--color-text-secondary)">Loading media assets...</p>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <!-- Empty State -->
    <div
      *ngIf="!isLoading && !filteredMedia.length"
      class="flex flex-col items-center justify-center h-64 rounded-xl bg-(--color-background-primary) text-center px-8"
      style="border: 1.5px dashed rgba(0,0,53,0.15);">
      <div
        class="w-13 h-13 rounded-full flex items-center justify-center mb-4"
        style="background: rgba(0,0,53,0.05);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000035" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <h3 class="text-sm font-medium text-(--color-text-primary) mb-1.5">No media found</h3>
      <p class="text-xs text-(--color-text-secondary) mb-5 max-w-xs leading-relaxed">
        Try adjusting your filters, updating your search, or uploading a new file.
      </p>
      <button
        type="button"
        class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-medium rounded-(--border-radius-md) cursor-pointer transition-opacity hover:opacity-85"
        style="background: #000035; color: #f4b400; border: none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Upload file
      </button>
    </div>

    <!-- Media Grid -->
    <app-media-grid
      *ngIf="!isLoading && filteredMedia.length"
      [mediaList]="filteredMedia"
      [selectedIds]="selectedIds"
      (toggleSelection)="onToggleMediaSelection($event)"
      (openDetails)="onSelectSingleMedia($event)"
      class="block">
    </app-media-grid>

  </div>

<!-- Details Panel -->
<aside class="hidden xl:flex w-85 shrink-0 flex-col overflow-hidden bg-(--color-background-primary)">

  <!-- Panel Header -->
  <div class="shrink-0 px-5 py-4" style="background: #000035;">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-6 h-6 rounded flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f4b400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
        </div>
        <div>
          <p class="text-xs font-medium m-0" style="color: #f4b400; letter-spacing: 0.06em; text-transform: uppercase;">File details</p>
        </div>
      </div>

      <!-- Saving indicator -->
      <span
        *ngIf="isSavingMetadata"
        class="flex items-center gap-1.5 text-[11px] font-medium"
        style="color: rgba(244,180,0,0.6);">
        <div class="w-1.5 h-1.5 rounded-full" style="border: 1.5px solid rgba(244,180,0,0.25); border-top-color: #f4b400; animation: spin 0.8s linear infinite;"></div>
        Saving
      </span>
    </div>
  </div>

  <!-- Subtle accent line separating header from body -->
  <div class="shrink-0 h-px" style="background: linear-gradient(to right, rgba(244,180,0,0.35), rgba(244,180,0,0.05));"></div>

  <!-- Panel Body -->
  <div class="flex-1 overflow-y-auto px-5 py-5">
    <app-media-details-panel
      [media]="selectedMedia"
      [isSaving]="isSavingMetadata"
      (metadataSave)="saveMetadata()">
    </app-media-details-panel>
  </div>

  <!-- Panel Footer -->
  <div class="shrink-0 px-5 py-4" style="border-top: 1px solid rgba(0,0,53,0.06);">

    <!-- Save button -->
    <button
      type="button"
      (click)="saveMetadata()"
      [disabled]="isSavingMetadata"
      class="w-full flex items-center justify-center gap-2 py-2.5 px-4 text-xs font-medium rounded-(--border-radius-md) cursor-pointer transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed"
      style="background: #000035; color: #f4b400; border: none;"
      onmouseenter="if(!this.disabled){ this.style.background='#f4b400'; this.style.color='#000035'; }"
      onmouseleave="this.style.background='#000035'; this.style.color='#f4b400';">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Save changes
    </button>

    <!-- Keyboard hint -->
    <p class="text-center text-[10px] text-(--color-text-tertiary) mt-2 mb-0">
      Changes also save automatically on blur
    </p>

  </div>

</aside>

</div>
