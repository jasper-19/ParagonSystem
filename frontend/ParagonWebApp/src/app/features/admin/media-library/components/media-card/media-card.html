<button
  type="button"
  (click)="onCardClick()"
  class="group relative overflow-hidden rounded-(--border-radius-lg) text-left w-full transition-all duration-200 hover:-translate-y-0.5 bg-(--color-background-primary)"
  [class.ring-2]="selected"
  [class.shadow-sm]="!selected"
  [ngClass]="selected ? 'shadow-[0_0_0_2px_#f4b400,0_4px_16px_rgba(0,0,53,0.1)]' : 'shadow-[0_1px_4px_rgba(0,0,53,0.07),0_0_0_1px_rgba(0,0,53,0.06)]'"
>

  <!-- Preview -->
  <div class="relative overflow-hidden bg-(--color-background-secondary) aspect-4/3">

    <!-- Image preview -->
    <ng-container *ngIf="isImage; else filePreview">
      <img
        [src]="previewUrl"
        [alt]="media.altText || media.fileName"
        class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]" />
    </ng-container>

    <!-- Non-image preview -->
    <ng-template #filePreview>
      <div class="flex h-full w-full flex-col items-center justify-center gap-2">
        <div class="w-10 h-10 rounded-full flex items-center justify-center bg-[rgba(0,0,53,0.05)]">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000035" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-35">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
        </div>
        <div class="text-center">
          <p class="text-xs font-medium text-(--color-text-secondary) mb-0">{{ typeLabel }}</p>
          <p class="text-[10px] text-(--color-text-tertiary)">No preview</p>
        </div>
      </div>
    </ng-template>

    <!-- Hover overlay -->
    <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none bg-linear-to-t from-[rgba(0,0,53,0.45)] to-transparent"></div>

    <!-- Selected tint -->
    <div *ngIf="selected" class="absolute inset-0 pointer-events-none bg-[rgba(244,180,0,0.08)]"></div>

    <!-- Checkbox -->
    <div class="absolute top-2.5 left-2.5">
      <label
        class="flex h-5 w-5 cursor-pointer items-center justify-center rounded transition-all duration-150"
        [ngClass]="selected
          ? 'bg-[#f4b400] shadow-[0_1px_4px_rgba(0,0,53,0.2)]'
          : 'bg-white/90 shadow-[0_1px_3px_rgba(0,0,53,0.15)]'"
        (click)="onCheckBoxClick($event)">
        <input type="checkbox" class="hidden" [checked]="selected" />
        <svg *ngIf="selected" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#000035" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </label>
    </div>

    <!-- Type badge -->
    <div class="absolute bottom-2.5 right-2.5">
      <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium uppercase tracking-[0.07em] bg-[rgba(0,0,53,0.75)] text-[rgba(244,180,0,0.9)] backdrop-blur-sm">
        {{ typeLabel }}
      </span>
    </div>

  </div>

  <!-- Info row -->
  <div class="px-3 py-2.5 flex items-center justify-between gap-2 border-t border-[rgba(0,0,53,0.05)]">
    <div class="min-w-0 flex-1">
      <p class="truncate text-xs font-medium text-(--color-text-primary) mb-0.5">{{ media.fileName }}</p>
      <p class="text-[10px] text-(--color-text-tertiary) truncate font-(--font-mono)">{{ media.mimeType }}</p>
    </div>
    <div class="shrink-0 text-right">
      <p class="text-[11px] font-medium text-(--color-text-secondary)">{{ readableSize }}</p>
    </div>
  </div>

</button>
