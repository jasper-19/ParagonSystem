<div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 2xl:grid-cols-5">
  <app-media-card
    *ngFor="let media of mediaList; trackBy: trackByMediaId"
    [media]="media"
    [selected]="isSelected(media.id)"
    (toggleSelection)="toggleSelection.emit($event)"
    (openDetails)="openDetails.emit($event)"
  >
  </app-media-card>
</div>
