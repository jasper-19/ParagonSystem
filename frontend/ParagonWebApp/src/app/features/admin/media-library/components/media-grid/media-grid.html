<div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 2xl:grid-cols-5">
  <button
    *ngFor="let media of mediaList; trackBy: trackByMediaId"
    type="button"
    (click)="onCardClick(media.id)"
    class="group relative overflow-hidden rounded-2xl border bg-white text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-md"
    [ngClass]="isSelected(media.id) ? 'border-blue-500 ring-2 ring-blue-200' : 'border-slate-200'"
  >
    <!-- Preview -->
    <div class="relative aspect-4/3 overflow-hidden bg-slate-100">
      <ng-container *ngIf="isImage(media); else nonImagePreview">
        <img
          [src]="getPreviewUrl(media)"
          [alt]="media.altText || media.fileName"
          class="h-full w-full object-cover transition duration-200 group-hover:scale-[1.02]"
        />
      </ng-container>

      <ng-template #nonImagePreview>
        <div class="flex h-full w-full items-center justify-center bg-slate-100">
          <div class="flex flex-col items-center gap-2 text-slate-500">
            <div class="rounded-full bg-white px-3 py-1 text-xs font-medium shadow-sm">
              {{ getTypeBadge(media) }}
            </div>
            <span class="text-xs">No preview available</span>
          </div>
        </div>
      </ng-template>

      <!-- Checkbox -->
      <div class="absolute left-3 top-3">
        <label
          class="flex h-6 w-6 cursor-pointer items-center justify-center rounded-md border border-slate-300 bg-white/95 shadow-sm"
          (click)="onCheckboxClick($event, media.id)"
        >
          <input
            type="checkbox"
            class="hidden"
            [checked]="isSelected(media.id)"
          />
          <svg
            *ngIf="isSelected(media.id)"
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 text-blue-600"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </label>
      </div>

      <!-- Type badge -->
      <div class="absolute bottom-3 right-3">
        <span class="rounded-full bg-slate-900/85 px-2.5 py-1 text-[11px] font-medium text-white">
          {{ getTypeBadge(media) }}
        </span>
      </div>
    </div>

    <!-- Info -->
    <div class="space-y-2 p-3">
      <p class="truncate text-sm font-medium text-slate-800">
        {{ media.fileName }}
      </p>

      <div class="flex items-center justify-between text-xs text-slate-500">
        <span>{{ getReadableSize(media.size) }}</span>
        <span class="truncate">{{ media.mimeType }}</span>
      </div>
    </div>
  </button>
</div>
