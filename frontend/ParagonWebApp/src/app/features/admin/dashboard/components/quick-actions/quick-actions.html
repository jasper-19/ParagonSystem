<section class="space-y-6 pt-12 pb-12">

  <div class="pb-4 border-b-2 border-slate-100">
    <h2 class="text-2xl font-bold text-[#000035]">
      Quick Actions
    </h2>
    <p class="text-sm text-slate-600 font-medium">
      Frequently used administrative tasks
    </p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">

    @for (action of actions; track action.label) {

      <a
        [routerLink]="action.route"
        class="group relative bg-white border-2 border-slate-200 rounded-2xl p-6
               hover:border-[#F4B400] hover:shadow-xl transition-all duration-300
               flex flex-col justify-between overflow-hidden"
      >

        <div class="relative space-y-4">

          <!-- Icon & Arrow -->
          <div class="flex items-center justify-between">
            <div class="w-12 h-12 rounded-xl bg-[#F4B400]/10
                        flex items-center justify-center
                        group-hover:bg-[#F4B400] group-hover:scale-110
                        transition-all duration-300 shadow-sm">
              <span class="text-lg font-bold text-[#F4B400] group-hover:text-[#000035] transition-colors">
                {{ action.icon ?? action.label.charAt(0) }}
              </span>
            </div>

            <div class="w-8 h-8 rounded-lg bg-slate-100
                        flex items-center justify-center
                        group-hover:bg-[#F4B400] group-hover:translate-x-1
                        transition-all duration-300">
              <svg class="w-4 h-4 text-slate-400 group-hover:text-[#000035] transition-colors"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
              </svg>
            </div>
          </div>

          <!-- Content -->
          <div class="space-y-2">
            <h3 class="text-base font-bold text-[#000035] group-hover:text-[#F4B400] transition-colors">
              {{ action.label }}
            </h3>

            @if (action.description) {
              <p class="text-xs text-slate-600 leading-relaxed line-clamp-2">
                {{ action.description }}
              </p>
            }
          </div>

        </div>

      </a>

    }

  </div>

</section>
