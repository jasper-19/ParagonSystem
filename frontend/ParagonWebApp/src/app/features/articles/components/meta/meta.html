<section class="bg-white py-12 border-b border-gray-100">

  <div class="max-w-4xl mx-auto px-6">

    <!-- Back + Category -->
    <div class="flex items-center gap-4 mb-8 text-sm">

      <a routerLink="/"
         class="flex items-center gap-2 text-gray-600 hover:text-gray-900 transition-colors duration-200 font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        <span>Back</span>
      </a>

      <span class="bg-[#f4b400] text-white px-3.5 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider">
        {{ category }}
      </span>

    </div>

    <!-- Title -->
    <h1 class="text-4xl md:text-5xl font-bold leading-tight text-gray-900 mb-6 tracking-tight">
      {{ title }}
    </h1>

    <!-- Excerpt -->
    <p *ngIf="excerpt"
       class="text-xl text-gray-600 leading-relaxed mb-10 font-normal text-justify">
      {{ excerpt }}
    </p>

    <!-- Author + Meta Info -->
    <div class="flex flex-wrap items-center gap-8 text-sm text-gray-600 mb-8">

      <!-- Avatar + Author -->
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full bg-linear-to-br from-gray-100 to-gray-200 flex items-center justify-center text-gray-500 text-sm font-medium border border-gray-200">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
          </svg>
        </div>

        <div>
          <div class="font-semibold text-gray-900">
            {{ author }}
          </div>
          <div class="text-xs text-gray-500 mt-0.5">
            Paragon Staff
          </div>
        </div>
      </div>

      <!-- Date -->
      <div class="flex items-center gap-2.5 text-gray-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span class="font-medium">{{ publishedAt | date:'MMMM d, yyyy' }}</span>
      </div>

      <!-- Reading Time -->
      <div *ngIf="readingTime" class="flex items-center gap-2.5 text-gray-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="font-medium">{{ readingTime }}</span>
      </div>

      <!-- Views -->
      <div class="flex items-center gap-2.5 text-gray-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
        <span class="font-medium">{{ views }} views</span>
      </div>

    </div>

    <!-- Divider -->
    <div class="border-t border-gray-100 my-8"></div>

    <!-- Credits -->
    <div class="flex flex-wrap items-center gap-8 text-sm text-gray-600">

      <span *ngIf="graphicby" class="font-light">
        <strong class="font-semibold text-gray-700">Graphics by:</strong> {{ graphicby }}
      </span>

      <span *ngIf="photoby" class="font-light">
        <strong class="font-semibold text-gray-700">Photo by:</strong> {{ photoby }}
      </span>

      <span *ngIf="illusrationby" class="font-light">
        <strong class="font-semibold text-gray-700">Illustration by:</strong> {{ illusrationby }}
      </span>

    </div>

    <!-- Share -->
    <div class="mt-8 flex items-center gap-6 text-sm text-gray-600">

      <div class="flex items-center gap-2.5 font-semibold text-gray-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
        <span>Share:</span>
      </div>

      <button class="flex items-center gap-2.5 text-gray-600 hover:text-gray-900 transition-colors duration-200 font-medium group">
        <svg class="w-4 h-4 group-hover:scale-110 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        <span>Copy Link</span>
      </button>

    </div>

  </div>

</section>
