<section class="relative py-16 bg-[#F4B400]/10 overflow-hidden">

  <div class="relative max-w-6xl mx-auto px-6 space-y-12">

    <!-- Section Header -->
    <div class="text-center space-y-4">

      <h2 class="text-3xl md:text-4xl font-bold text-[#000035] tracking-tight">
        Open Positions
      </h2>

      <p class="text-slate-600 max-w-2xl mx-auto text-base">
        Explore the roles currently available and find where your strengths align.
      </p>

    </div>

    <!-- Empty State -->
    <ng-container *ngIf="positions().length === 0; else list">

      <div class="text-center py-12 bg-white rounded-2xl border border-slate-200">
        <p class="text-slate-500 text-lg">No open positions at the moment.</p>
        <p class="text-slate-400 text-sm mt-2">Check back soon for new opportunities!</p>
      </div>

    </ng-container>

    <!-- Positions Grid -->
    <ng-template #list>
      <div class="grid md:grid-cols-2 gap-8">

        <ng-container *ngFor="let position of positions()">

          <div
            class="group relative p-7 bg-white rounded-3xl border border-slate-200
                   hover:border-[#F4B400]/60
                   hover:shadow-2xl hover:shadow-[#000035]/10
                   transition-all duration-500
                   hover:-translate-y-1
                   overflow-hidden"
          >

            <!-- Info Icon Button -->
            <button
              (click)="openInfo(position)"
              class="absolute top-5 right-5 w-9 h-9 rounded-full bg-slate-100
                     flex items-center justify-center
                     text-slate-500 hover:bg-[#F4B400] hover:text-white
                     transition-all duration-300 shadow-sm"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </button>

            <!-- Department Tag -->
            <span
              class="inline-block text-xs uppercase tracking-wider font-semibold
                     bg-linear-to-r from-[#F4B400]/10 to-[#FFD966]/10
                     text-[#000035] border border-[#F4B400]/20
                     px-3 py-1.5 rounded-full mb-4"
            >
              {{ position.department }}
            </span>

            <!-- Title -->
            <h3 class="text-xl font-bold text-[#000035] mb-3 group-hover:text-[#F4B400] transition-colors duration-300">
              {{ position.title }}
            </h3>

            <!-- Description -->
            <p class="text-slate-600 leading-relaxed mb-4 text-sm">
              {{ position.description }}
            </p>

            <!-- CTA -->
            <div class="mt-auto">

              <a
                routerLink="/join"
                fragment="application"
                [queryParams]="{ position: position.id }"
                class="inline-flex items-center gap-2 text-[#F4B400] font-semibold text-sm
                       group-hover:gap-3 transition-all duration-300"
              >
                Apply for this role
                <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
              </a>

            </div>

            <!-- Soft Background Glow -->
            <div class="absolute inset-0 bg-linear-to-br from-[#F4B400]/5 to-transparent
                        opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>

          </div>

        </ng-container>

      </div>
    </ng-template>

  </div>

  <!-- Reusable Info Modal -->
  <app-position-info-modal
    [isOpen]="showInfoModal()"
    [position]="selectedPosition()"
    (closed)="closeInfo()"
  ></app-position-info-modal>

</section>
