<aside
  class="h-screen fixed left-0 top-0 z-60 transition-all duration-300
         bg-[#000035] border-r border-[#f4b400]/20
         w-72"
  [ngClass]="{
    'md:w-72': isSidebarOpen,
    'md:w-20': !isSidebarOpen,
    'md:translate-x-0': true,
    'translate-x-0': isSidebarOpen,
    '-translate-x-full': !isSidebarOpen
  }"
>
  <nav class="flex flex-col h-full overflow-y-auto px-3 py-6">

    <!-- LOGO SECTION -->
    <div class="mb-6 pb-6 border-b border-[#f4b400]/15">
      <div
        class="flex items-center justify-between transition-all duration-300"
        [class.flex-col]="!isSidebarOpen"
        [class.gap-2]="!isSidebarOpen"
      >

        <!-- Logo Container -->
        <div
          class="flex items-center gap-3 min-w-0"
          [class.flex-col]="!isSidebarOpen"
          [class.w-full]="!isSidebarOpen"
          [class.justify-center]="!isSidebarOpen"
        >
          <div
            class="shrink-0 w-12 h-12 flex items-center justify-center rounded-xl
                   group-hover:border-[#f4b400]/40
                   transition-all duration-300"
          >
            <img src="assets/PRG_Logo.png" alt="Paragon Logo" class="w-14 h-14 object-contain" />
          </div>

          <span
            *ngIf="isSidebarOpen"
            class="text-2xl font-bold text-[#f4b400]"
          >
            Paragon Admin
          </span>
        </div>

        <!-- Collapse Toggle -->
        <button
          (click)="toggleSidebar()"
          *ngIf="isSidebarOpen"
          class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg
                 text-[#f4b400] hover:bg-[#f4b400]/10
                 border border-[#f4b400]/20 hover:border-[#f4b400]/40
                 transition-all duration-300"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M13 21h6c1.1046 0 2-.8954 2-2V5c0-1.10457-.8954-2-2-2h-6v18Z"/>
            <path fill-rule="evenodd" d="M11 3H5c-1.10457 0-2 .89543-2 2v14c0 1.1046.89543 2 2 2h6V3Zm-2.29295 7.7071c.39052-.3905.39052-1.02368 0-1.41421-.39053-.39052-1.02369-.39052-1.41421 0L5.29289 11.2928c-.39052.3906-.39052 1.0237 0 1.4142l1.99995 2c.39052.3905 1.02368.3905 1.41421 0 .39052-.3905.39052-1.0237 0-1.4142l-1.29284-1.2929 1.29284-1.2928Z" clip-rule="evenodd"/>
          </svg>
        </button>

        <!-- Collapsed Toggle -->
        <button
          (click)="toggleSidebar()"
          *ngIf="!isSidebarOpen"
          class="w-full mt-3 h-8 flex items-center justify-center rounded-lg
                 text-[#f4b400] hover:bg-[#f4b400]/10
                 border border-[#f4b400]/20 hover:border-[#f4b400]/40
                 transition-all duration-300"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M13 21h6c1.1046 0 2-.8954 2-2V5c0-1.10457-.8954-2-2-2h-6v18Z"/>
            <path fill-rule="evenodd" d="M11 3H5c-1.10457 0-2 .89543-2 2v14c0 1.1046.89543 2 2 2h6V3Zm-5.70711 7.7071c-.39052-.3905-.39052-1.02368 0-1.41421.39053-.39052 1.02369-.39052 1.41422 0l1.99994 1.99991c.39052.3906.39052 1.0237 0 1.4142l-1.99994 2c-.39053.3905-1.02369.3905-1.41422 0-.39052-.3905-.39052-1.0237 0-1.4142l1.29284-1.2929-1.29284-1.2928Z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- MAIN NAV -->
    <div class="flex-1 space-y-1.5 mb-6">
      <ng-container *ngFor="let item of navItems">

        <!-- SINGLE LINK -->
        <a
          *ngIf="!item.children"
          [routerLink]="item.route"
          routerLinkActive #rla="routerLinkActive"
          [routerLinkActiveOptions]="{ exact: item.route === '/admin' }"
          [ngClass]="{
            'flex items-center rounded-lg text-sm font-medium transition-colors': true,
            'gap-3 px-3 py-2.5': isSidebarOpen,
            'justify-center py-3': !isSidebarOpen,
            'bg-[#f4b400]/15 text-[#f4b400] border-l-4 border-[#f4b400]': rla.isActive,
            'text-gray-300 hover:bg-[#f4b400]/10 hover:text-white': !rla.isActive
          }"
        >
          <span class="w-5 h-5" [innerHTML]="getIcon(item.icon)"></span>
          <span *ngIf="isSidebarOpen">{{ item.label }}</span>
        </a>

        <!-- DROPDOWN BUTTON -->
        <div *ngIf="item.children" routerLinkActive #parentRla="routerLinkActive">
          <button
            (click)="toggleItem(item)"
            [ngClass]="{
              'flex items-center w-full rounded-lg text-sm font-medium transition-colors': true,
              'gap-3 px-3 py-2.5': isSidebarOpen,
              'justify-center py-3': !isSidebarOpen,
              'bg-[#f4b400]/15 text-[#f4b400] border-l-4 border-[#f4b400]': parentRla.isActive,
              'bg-[#f4b400]/10 text-white': item.open && !parentRla.isActive,
              'text-gray-300 hover:bg-[#f4b400]/10 hover:text-white': !item.open && !parentRla.isActive
            }"
          >
            <span class="w-5 h-5" [innerHTML]="getIcon(item.icon)"></span>
            <span *ngIf="isSidebarOpen" class="flex-1 text-left">{{ item.label }}</span>
            <svg
              *ngIf="isSidebarOpen"
              class="w-4 h-4 transition-transform"
              [class.rotate-180]="item.open"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <!-- DROPDOWN ITEMS -->
          <div *ngIf="item.open" [ngClass]="{'mt-1 space-y-1': true, 'pl-1': !isSidebarOpen, 'ml-4 pl-4 border-l-2 border-[#f4b400]/20': isSidebarOpen}">
            <a
              *ngFor="let child of item.children"
              [routerLink]="child.route"
              routerLinkActive #childRla="routerLinkActive"
              [ngClass]="{
                'flex items-center rounded-lg text-xs font-medium transition-colors': true,
                'justify-center py-2.5': !isSidebarOpen,
                'gap-2.5 px-3 py-2': isSidebarOpen,
                'bg-[#f4b400]/20 text-[#f4b400] font-semibold border-l-4 border-[#f4b400]': childRla.isActive,
                'text-gray-400 hover:bg-[#f4b400]/10 hover:text-[#f4b400]': !childRla.isActive
              }"
            >
              <span [ngClass]="{'w-4 h-4': !isSidebarOpen, 'w-3.5 h-3.5': isSidebarOpen}" [innerHTML]="getIcon(child.icon)"></span>
              <span *ngIf="isSidebarOpen">{{ child.label }}</span>
            </a>
          </div>
        </div>

      </ng-container>
    </div>

    <!-- ACCOUNT (BOTTOM) -->
    <div class="pt-4 border-t border-[#f4b400]/20">
      <div [ngClass]="{'space-y-4 px-3': isSidebarOpen, 'space-y-3': !isSidebarOpen}">
        <ng-container *ngFor="let acc of accountItems; let last = last">
          <a
            [routerLink]="acc.route"
            routerLinkActive #accRla="routerLinkActive"
            (click)="handleAccountItemClick($event, acc)"
            [ngClass]="{
              'flex items-center rounded-lg text-sm font-medium transition-colors': true,
              'gap-3 px-3 py-2.5': isSidebarOpen,
              'justify-center py-3': !isSidebarOpen,
              'text-[#f4b400] bg-[#f4b400]/10 hover:bg-[#f4b400]/20': !last && accRla.isActive,
              'text-[#f4b400] hover:bg-[#f4b400]/15': !last && !accRla.isActive,
              'text-red-400 bg-red-500/10 hover:bg-red-500/20 border border-red-500/40': last
            }"
          >
            <span class="w-5 h-5" [innerHTML]="getIcon(acc.icon)"></span>
            <span *ngIf="isSidebarOpen">{{ acc.label }}</span>
          </a>
        </ng-container>
      </div>
    </div>

  </nav>
</aside>
