<ng-container *ngIf="isOpen()">

  <div class="fixed inset-0 bg-black/60 backdrop-blur-md z-9999 flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl overflow-hidden relative z-10000">

      <!-- Header – default variant -->
      <div
        *ngIf="variant() !== 'danger'"
        class="relative px-8 py-6 bg-linear-to-br from-[#000035] via-[#001f5c] to-[#000035]"
      >
        <div class="relative flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <h3 class="text-2xl md:text-3xl font-bold text-white">
              {{ title() }}
            </h3>
          </div>
          <button
            (click)="close()"
            class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl
                   bg-white/10 hover:bg-white/20 text-white
                   transition-all duration-300 backdrop-blur-sm
                   border border-white/10 hover:border-white/20"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Header – danger variant -->
      <div
        *ngIf="variant() === 'danger'"
        class="relative px-8 py-6 bg-linear-to-br from-red-700 via-red-600 to-red-700"
      >
        <div class="relative flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <h3 class="text-2xl md:text-3xl font-bold text-white">
              {{ title() }}
            </h3>
          </div>
          <button
            (click)="close()"
            class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl
                   bg-white/10 hover:bg-white/20 text-white
                   transition-all duration-300 backdrop-blur-sm
                   border border-white/10 hover:border-white/20"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Content -->
      <div class="p-8 space-y-6">

        <!-- Message -->
        <div>
          <p class="text-slate-700 leading-relaxed text-base">
            {{ message() }}
          </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-2">

          <button
            (click)="close()"
            class="px-6 py-3 rounded-xl border-2 border-[#f4b400] text-slate-700 font-semibold
                   hover:border-[#f4b400]/50 hover:bg-slate-50
                   transition-all duration-300"
          >
            {{ cancelText() }}
          </button>

          <button
            (click)="confirm()"
            class="px-6 py-3 rounded-xl bg-[#000035] text-white! font-bold
                   shadow-lg shadow-[#000035]/20
                   hover:shadow-xl hover:shadow-[#000035]/30
                   hover:-translate-y-0.5
                   transition-all duration-300
                   flex items-center justify-center gap-2 group"
            [ngClass]="{
                  'bg-[#000035] text-white! hover:bg-[#0a1a2e]': variant() === 'default',
                  'bg-red-600 text-white! hover:bg-red-700': variant() === 'danger'
                }"
          >
            <span class="text-white!">{{ confirmText() }}</span>
            <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            </svg>
          </button>

        </div>

      </div>

    </div>

  </div>

</ng-container>
