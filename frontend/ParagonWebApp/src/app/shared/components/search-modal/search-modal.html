<!-- OVERLAY -->
<div class="fixed inset-0 z-50  backdrop-blur-md flex items-center justify-center p-4">

  <!-- MODAL -->
  <div class="bg-white w-full max-w-6xl max-h-[90vh] rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,0,53,0.3)] flex flex-col overflow-hidden">

    <!-- ========================= -->
    <!-- HEADER WITH SEARCH -->
    <!-- ========================= -->
    <div class="px-8 py-8 bg-gradient-to-br from-[#000035] to-[#000035]/90">
      <div class="flex items-start justify-between mb-6">
        <div>
          <h2 class="text-4xl font-bold text-white tracking-tight">
            Explore <span class="text-[#f4b400] font-extrabold italic">Paragon</span>
          </h2>
          <p class="text-m text-white/70 mt-2 font-light">
            Uncover stories that liberate voices and amplify the truth across our campus.
          </p>
        </div>

        <button
          class="text-white/60 hover:text-white text-3xl transition-colors duration-200"
          (click)="close.emit()"
          aria-label="Close"
        >
          ×
        </button>
      </div>

      <!-- SEARCH INPUT IN HEADER -->
      <div class="relative">
        <input
          type="text"
          placeholder="Search articles, categories, tags, or people..."
          class="w-full pl-12 pr-4 py-4 border-0 rounded-xl text-sm bg-white/10 text-white backdrop-blur-sm
                 focus:outline-none focus:ring-2 focus:ring-[#f4b400] focus:bg-white/15
                 transition-all duration-200 placeholder:text-white/50"
        />
        <svg
          class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/60"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
        </svg>
      </div>
    </div>

    <!-- ========================= -->
    <!-- CATEGORIES SECTION -->
    <!-- ========================= -->
    <div class="flex-1 overflow-y-auto">
      <div class="px-8 py-6">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Browse by Category</h3>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-4">

          <!-- SPORTS -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <circle cx="12" cy="12" r="9" stroke-width="1.5"/>
                  <path d="M12 3v18M3 12h18" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">Sports</h4>
            </div>
          </div>

          <!-- NEWS -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <rect x="4" y="3" width="16" height="18" rx="2" stroke-width="1.5"/>
                  <path d="M8 7h8M8 11h8M8 15h5" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">News</h4>
            </div>
          </div>

          <!-- FEATURES -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path d="M12 3l3 6 6 .9-4.5 4.4 1 6.2-5.5-3-5.5 3 1-6.2L3 9.9 9 9z" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">Features</h4>
            </div>
          </div>

          <!-- COLUMN -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path d="M4 19V5a2 2 0 0 1 2-2h12v16a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2z" stroke-width="1.5"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">Column</h4>
            </div>
          </div>

          <!-- LITERARY -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path d="M4 6h16M4 10h16M4 14h10" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">Literary</h4>
            </div>
          </div>

          <!-- EDITORIAL -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path d="M5 19l4-1 10-10-3-3L6 15l-1 4z" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">Editorial</h4>
            </div>
          </div>

          <!-- DEVCOM -->
          <div class="group relative bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-2xl p-6 cursor-pointer transition-all duration-300 hover:border-[#f4b400] hover:shadow-lg hover:-translate-y-1">
            <div class="flex flex-col items-start">
              <div class="w-12 h-12 rounded-xl bg-[#f4b400]/10 flex items-center justify-center mb-4 group-hover:bg-[#f4b400]/20 transition-colors duration-300">
                <svg class="w-6 h-6 text-[#f4b400]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path d="M4 4h16v12H7l-3 4V4z" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
              </div>
              <h4 class="font-semibold text-[#000035] text-base">DevCom</h4>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->
    <div class="px-8 py-5 bg-[#f4b400]/40 border-t border-gray-100">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-[#000035]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-s text-[#000035] font-light">
            Search by title, tags, author, writer, graphic artist, or copyreader
          </span>
        </div>
      </div>
    </div>

  </div>
</div>
