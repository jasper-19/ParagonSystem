<ng-container *ngIf="isOpen() && position() as pos">

  <div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4"
       (click)="close()">

    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden relative"
         (click)="$event.stopPropagation()">

      <!-- Header with Background -->
      <div class="relative bg-linear-to-br from-[#000035] via-[#001f5c] to-[#000035] px-8 py-6">
        
        <!-- Decorative Elements -->
        <div class="absolute inset-0 opacity-10">
          <div class="absolute top-0 right-0 w-64 h-64 bg-[#F4B400] rounded-full blur-3xl"></div>
        </div>

        <div class="relative flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <h3 class="text-2xl md:text-3xl font-bold text-white mb-1">
              {{ pos.title }}
            </h3>
            <div class="flex items-center gap-2">
              <div class="w-1 h-1 bg-[#F4B400] rounded-full"></div>
              <p class="text-sm text-slate-300 font-medium">
                {{ pos.department }}
              </p>
            </div>
          </div>

          <!-- Close Button -->
          <button
            (click)="close()"
            class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl
                   bg-white/10 hover:bg-white/20 text-white
                   transition-all duration-300 backdrop-blur-sm
                   border border-white/10 hover:border-white/20"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

      </div>

      <!-- Content -->
      <div class="p-8 space-y-6 max-h-[calc(100vh-12rem)] overflow-y-auto">

        <!-- Description -->
        <div>
          <p class="text-slate-700 leading-relaxed text-base">
            {{ pos.description }}
          </p>
        </div>

        <!-- Sub Roles -->
        <div *ngIf="pos.subRoles?.length" class="space-y-4">

          <div class="flex items-center gap-2">
            <div class="w-1 h-5 bg-[#F4B400] rounded-full"></div>
            <h4 class="text-lg font-bold text-[#000035]">
              Specializations
            </h4>
          </div>

          <div class="grid gap-3">

            <div *ngFor="let sub of pos.subRoles"
                class="group p-5 bg-linear-to-br from-slate-50 to-white rounded-2xl 
                       border-2 border-slate-200 transition-all duration-300
                       hover:border-[#F4B400]/40 hover:shadow-lg">

              <div class="flex items-start gap-3">
                <div class="w-2 h-2 bg-[#F4B400] rounded-full mt-2 shrink-0"></div>
                <div class="flex-1 min-w-0">
                  <h5 class="text-base font-bold text-[#000035] mb-2">
                    {{ sub.name }}
                  </h5>

                  <p class="text-sm text-slate-600 leading-relaxed">
                    {{ sub.description }}
                  </p>
                </div>
              </div>

            </div>

          </div>

        </div>

        <!-- Requirements -->
        <!-- <div *ngIf="pos.requirements?.length" class="space-y-3">
          <div class="flex items-center gap-2">
            <div class="w-1 h-5 bg-[#F4B400] rounded-full"></div>
            <h4 class="text-lg font-bold text-[#000035]">
              Requirements
            </h4>
          </div>

          <ul class="space-y-2 pl-1">
            <li *ngFor="let req of pos.requirements" class="flex items-start gap-3">
              <div class="w-1.5 h-1.5 bg-[#F4B400] rounded-full mt-2 flex-shrink-0"></div>
              <span class="text-sm text-slate-700 leading-relaxed">{{ req }}</span>
            </li>
          </ul>
        </div> -->

        <!-- Slots -->
        <!-- <div *ngIf="pos.slots" class="pt-4 border-t border-slate-200">
          <div class="inline-flex items-center gap-2 px-4 py-2 bg-[#F4B400]/10 rounded-xl border border-[#F4B400]/20">
            <svg class="w-4 h-4 text-[#F4B400]" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
            </svg>
            <span class="text-sm font-medium text-slate-700">
              Available Slots:
              <span class="font-bold text-[#000035] ml-1">{{ pos.slots }}</span>
            </span>
          </div>
        </div> -->

      </div>

    </div>
  </div>

</ng-container>
